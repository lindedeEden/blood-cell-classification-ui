<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>血球型態分類軟體 — 登入</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400,700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#4F46E5" },
          fontFamily: { sans: ["Inter", "sans-serif"] },
        },
      },
    };
  </script>
  <style>
    .login-card { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
    .input-focus:focus { outline: none; border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
  </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="login-card bg-white rounded-2xl border border-slate-200 p-8 sm:p-10">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-900">血球型態分類軟體</h1>
        <p class="text-slate-500 text-sm mt-1">請登入以使用檢體管理與閱片功能</p>
      </div>

      <form id="login-form" class="space-y-5" autocomplete="on">
        <div>
          <label for="account" class="block text-sm font-medium text-slate-700 mb-1.5">帳號</label>
          <input
            type="text"
            id="account"
            name="account"
            autocomplete="username"
            placeholder="請輸入帳號"
            value="admin"
            class="input-focus w-full px-4 py-3 rounded-lg border border-slate-300 bg-white text-slate-800 placeholder-slate-400 transition"
            required
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">密碼</label>
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="請輸入密碼"
            value="admin"
            class="input-focus w-full px-4 py-3 rounded-lg border border-slate-300 bg-white text-slate-800 placeholder-slate-400 transition"
            required
          />
        </div>
        <p id="login-error" class="text-sm text-red-600 hidden" role="alert"></p>
        <button
          type="submit"
          class="w-full py-3 rounded-lg bg-primary text-white font-semibold hover:bg-indigo-600 focus:ring-2 focus:ring-primary focus:ring-offset-2 transition"
        >
          登入
        </button>
      </form>
    </div>
  </div>

  <script src="assets/js/login.js"></script>
</body>
</html>
