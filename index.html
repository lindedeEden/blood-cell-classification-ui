<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>血球型態分類軟體 — 登入</title>
  <!--
    ▌ 架構說明
    ▌ 載入順序：config → constants → services → (頁面腳本)
    ▌ 原版問題：database.js 直接暴露所有病患資料給前端，任何人開 DevTools 即可看見
    ▌ 優化版：登入頁不載入任何病患資料；資料由登入後的 API 請求取得
  -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#4F46E5" },
          fontFamily: { sans: ["Inter", "sans-serif"] },
        },
      },
    };
  </script>
  <style>
    .login-card { box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15); }
    .input-focus:focus { outline: none; border-color: #4F46E5; box-shadow: 0 0 0 3px rgba(79,70,229,0.2); }
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-feature-settings: 'liga';
      font-feature-settings: 'liga';
      -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="login-card bg-white rounded-2xl border border-slate-200 p-8 sm:p-10">
      <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-900">血球型態分類軟體</h1>
        <p class="text-slate-500 text-sm mt-1">請登入以使用檢體管理與閱片功能</p>
      </div>

      <!-- 閒置逾時提示（由 ?expired=1 觸發） -->
      <div id="idle-alert" class="hidden mb-4 p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-700">
        <span class="material-symbols-outlined text-base align-middle mr-1">timer_off</span>
        閒置逾時，已自動登出。請重新登入。
      </div>

      <form id="login-form" class="space-y-5" autocomplete="on" novalidate>
        <div>
          <label for="account" class="block text-sm font-medium text-slate-700 mb-1.5">帳號</label>
          <input
            type="text"
            id="account"
            name="account"
            autocomplete="username"
            placeholder="請輸入帳號"
            value="admin"
            class="input-focus w-full px-4 py-3 rounded-lg border border-slate-300 bg-white text-slate-800 placeholder-slate-400 transition"
            required
          />
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">密碼</label>
          <div class="relative">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="請輸入密碼"
              value="admin"
              class="input-focus w-full px-4 py-3 pr-12 rounded-lg border border-slate-300 bg-white text-slate-800 placeholder-slate-400 transition"
              required
            />
            <button type="button" id="toggle-pwd"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600"
              aria-label="顯示/隱藏密碼">
              <span class="material-symbols-outlined text-xl" id="toggle-pwd-icon">visibility_off</span>
            </button>
          </div>
        </div>

        <p id="login-error" class="text-sm text-red-600 hidden" role="alert" aria-live="polite"></p>

        <button
          type="submit"
          id="login-btn"
          class="w-full py-3 rounded-lg bg-primary text-white font-semibold hover:bg-indigo-600 focus:ring-2 focus:ring-primary focus:ring-offset-2 transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          登入
        </button>
      </form>

      <!-- Demo 模式提示（上線時移除） -->
      <div id="demo-notice" class="mt-6 p-3 bg-blue-50 border border-blue-100 rounded-lg text-xs text-blue-600">
        <strong>Demo 模式</strong>｜測試帳號：admin / admin 或 user / user<br/>
        <span class="text-blue-400">（上線前請移除此提示並改用真實後端驗證）</span>
      </div>
    </div>
  </div>

  <!--
    ▌ 載入順序說明：
    ▌ 1. config.js    → 全域設定（最優先）
    ▌ 2. constants/   → 純常數，不依賴其他模組
    ▌ 3. services/    → 依賴 config 與 constants
    ▌ 4. 頁面腳本     → 依賴以上所有模組
    ▌
    ▌ 原版問題：database.js（含全部病患資料）在登入頁就載入了，
    ▌           任何人不需登入即可在 DevTools 看到所有病患 PHI 資料。
    ▌ 優化版：登入頁不載入 database.js；病患資料只在登入後的頁面透過 API 取得。
  -->
  <script src="src/config/config.js"></script>
  <script src="src/constants/cell-types.js"></script>
  <script src="src/services/api.service.js"></script>
  <script src="src/services/auth.service.js"></script>
  <script src="src/utils/validators.js"></script>

  <!-- 登入頁邏輯：內聯於此（小型單頁邏輯，無需獨立檔案） -->
  <script>
  (function () {
    'use strict';

    // 閒置逾時提示
    if (new URLSearchParams(window.location.search).get('expired') === '1') {
      document.getElementById('idle-alert').classList.remove('hidden');
    }

    // 顯示/隱藏密碼
    const toggleBtn = document.getElementById('toggle-pwd');
    const pwdInput  = document.getElementById('password');
    const toggleIcon = document.getElementById('toggle-pwd-icon');
    toggleBtn.addEventListener('click', () => {
      const isHidden = pwdInput.type === 'password';
      pwdInput.type = isHidden ? 'text' : 'password';
      toggleIcon.textContent = isHidden ? 'visibility' : 'visibility_off';
    });

    // 表單提交
    const form     = document.getElementById('login-form');
    const errorEl  = document.getElementById('login-error');
    const loginBtn = document.getElementById('login-btn');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.remove('hidden');
      loginBtn.disabled = false;
      loginBtn.textContent = '登入';
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const account  = document.getElementById('account').value;
      const password = document.getElementById('password').value;

      // 前端格式驗證
      const validation = Validators.loginForm(account, password);
      if (!validation.valid) { showError(validation.error); return; }

      // 鎖定按鈕，避免重複送出
      errorEl.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.textContent = '驗證中…';

      // 呼叫 AuthService（後端驗證）
      const result = await AuthService.login(account.trim(), password);
      if (result.ok) {
        window.location.href = AppConfig.ROUTES.SPECIMEN_LIST;
      } else {
        showError(result.error || '登入失敗，請稍後再試');
      }
    });
  })();
  </script>
</body>
</html>
