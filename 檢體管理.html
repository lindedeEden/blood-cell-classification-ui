  <script>
    (function () {
      var currentSpecimenId = null;
      var filteredList = [];
      var currentMode = null;
      var sortKey = 'time';
      var sortAsc = false;
      var fontLevel = 1;

      function setDefaultDateToday() {
        var today = '2025-08-07';
        var start = document.getElementById('analysis-date-start');
        var end = document.getElementById('analysis-date-end');
        if (start && !start.dataset.initialized) { start.value = today; start.dataset.initialized = '1'; }
        if (end && !end.dataset.initialized) { end.value = today; end.dataset.initialized = '1'; }
      }

      function getSelectedStatuses() {
        var checked = [];
        document.querySelectorAll('.status-filter:checked').forEach(function (cb) { checked.push(cb.value); });
        return checked;
      }

      function setStatusFilterCheckboxes(keys) {
        document.querySelectorAll('.status-filter').forEach(function (cb) {
          cb.checked = keys.indexOf(cb.value) !== -1;
        });
      }

      function getFilters() {
        return {
          dateStart: document.getElementById('analysis-date-start').value,
          dateEnd: document.getElementById('analysis-date-end').value,
          department: document.getElementById('filter-department').value,
          machine: document.getElementById('filter-machine').value,
          search: (document.getElementById('specimen-search').value || '').trim(),
          exactMatch: document.getElementById('exact-match').checked,
          statuses: getSelectedStatuses()
        };
      }

      function applyFilters() {
        var f = getFilters();
        filteredList = MOCK_SPECIMENS.filter(function (s) {
          if (f.dateStart && s.analysisTime) {
            var docDate = s.analysisTime.slice(0, 10).replace(/\//g, '-');
            if (docDate < f.dateStart) return false;
          }
          if (f.dateEnd && s.analysisTime) {
            var docDate = s.analysisTime.slice(0, 10).replace(/\//g, '-');
            if (docDate > f.dateEnd) return false;
          }
          if (f.department && s.department !== f.department) return false;
          if (f.machine && s.machine !== f.machine) return false;
          if (f.search) {
            var id = (s.id || '').toUpperCase();
            var pid = (s.patientId || '').toUpperCase();
            var search = f.search.toUpperCase();
            if (f.exactMatch) {
              if (id !== search && pid !== search) return false;
            } else {
              if (id.indexOf(search) === -1 && pid.indexOf(search) === -1) return false;
            }
          }
          var selected = f.statuses || [];
          var isVerifiedSpecimen = !!(s.statusDone || (s.status && s.status.indexOf('Verified') !== -1));
          if (isVerifiedSpecimen && selected.indexOf('Verified') === -1) return false;
          if (selected.length === 0) return true;
          var hasStatus = (s.status || []).some(function (st) { return selected.indexOf(st) !== -1; });
          var showVerified = isVerifiedSpecimen && selected.indexOf('Verified') !== -1;
          if (!hasStatus && !showVerified) return false;
          return true;
        });
        function isCompleted(s) { return !!(s.statusDone || (s.status && s.status.indexOf('Verified') !== -1)); }
        if (sortKey === 'id') {
          filteredList.sort(function (a, b) {
            if (isCompleted(a) !== isCompleted(b)) return isCompleted(a) ? 1 : -1;
            var a5 = (a.id || '').slice(-5);
            var b5 = (b.id || '').slice(-5);
            var cmp = a5.localeCompare(b5, undefined, { numeric: true });
            return sortAsc ? cmp : -cmp;
          });
        } else if (sortKey === 'time') {
          filteredList.sort(function (a, b) {
            if (isCompleted(a) !== isCompleted(b)) return isCompleted(a) ? 1 : -1;
            var ta = (a.analysisTime || '').replace(/-/g, '').replace(/[:\s]/g, '');
            var tb = (b.analysisTime || '').replace(/-/g, '').replace(/[:\s]/g, '');
            var cmp = ta.localeCompare(tb);
            return sortAsc ? cmp : -cmp;
          });
        } else if (sortKey === 'urgency') {
          filteredList.sort(function (a, b) {
            if (isCompleted(a) !== isCompleted(b)) return isCompleted(a) ? 1 : -1;
            var ua = Number(a.urgency);
            var ub = Number(b.urgency);
            if (isNaN(ua)) ua = 0;
            if (isNaN(ub)) ub = 0;
            var cmp = ua - ub;
            return sortAsc ? cmp : -cmp;
          });
        }
        return filteredList;
      }

      function renderStatus(specimen) {
        var html = '';
        var statuses = specimen.status || [];
        statuses.forEach(function (st) {
          var style = STATUS_STYLES[st] || 'bg-gray-100 text-gray-800';
          var done = specimen.statusDone && st !== 'Locked';
          if (done) style = 'bg-green-100 text-green-800';
          html += '<span class="status-capsule ' + style + '">';
          if (done) html += '<span class="material-symbols-outlined text-xs mr-1">check</span>';
          if (st === 'Locked') html += '<span class="material-symbols-outlined text-xs mr-1">lock</span>';
          html += st + '</span>';
        });
        return html;
      }

      function rowClass(s, index) {
        if (s.locked) return 'bg-striped';
        if (s.statusDone) return 'bg-gray-50';
        return index % 2 ? 'bg-gray-50' : 'bg-white';
      }

      function renderTable() {
        applyFilters();
        var tbody = document.getElementById('specimen-tbody');
        tbody.innerHTML = '';
        filteredList.forEach(function (s, i) {
          var tr = document.createElement('tr');
          tr.className = 'hover:bg-gray-50 ' + rowClass(s, i);
          tr.dataset.specimenId = s.id;
          var enterDisabled = s.locked ? ' disabled' : '';
          var enterText = s.locked ? '已鎖定' : '進入閱片';
          tr.innerHTML =
            '<td class="p-2 py-4"><input type="checkbox" class="row-check rounded border-gray-300 text-primary focus:ring-primary" data-id="' + s.id + '"/></td>' +
            '<td class="p-2 py-4"><div class="flex flex-col gap-1 items-start">' + renderStatus(s) + '</div></td>' +
            '<td class="p-2 py-4">' + (s.urgency != null ? s.urgency : '') + '</td>' +
            '<td class="p-2 py-4">' + s.id + '</td>' +
            '<td class="p-2 py-4">' + s.patientId + '</td>' +
            '<td class="p-2 py-4">' + s.name + '</td>' +
            '<td class="p-2 py-4">' + s.department + '</td>' +
            '<td class="p-2 py-4">' + s.machine + '</td>' +
            '<td class="p-2 py-4">' + s.location + '</td>' +
            '<td class="p-2 py-4">' + s.analysisTime + '</td>' +
            '<td class="p-2 py-4">' + (s.editor || '') + '</td>' +
            '<td class="p-2 py-4"><button type="button" class="text-primary text-xs hover:underline enter-review-btn" data-id="' + s.id + '"' + enterDisabled + '>' + enterText + '</button></td>';
          tbody.appendChild(tr);
        });

        tbody.querySelectorAll('tr').forEach(function (tr) {
          tr.addEventListener('click', function (e) {
            if (e.target.type === 'checkbox' || e.target.classList.contains('enter-review-btn')) return;
            if (e.target.closest('.status-capsule')) return;
            selectRow(tr.dataset.specimenId);
          });
          tr.addEventListener('dblclick', function (e) {
            if (e.target.type === 'checkbox') return;
            var id = tr.dataset.specimenId;
            var spec = getSpecimenById(id);
            if (id && spec && !spec.locked) goToImageReview(id);
          });
        });
        tbody.querySelectorAll('.enter-review-btn:not([disabled])').forEach(function (btn) {
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var id = btn.dataset.id;
            if (id) goToImageReview(id);
          });
        });
        document.getElementById('footer-status').textContent = '已篩選 ' + filteredList.length + ' 筆';
      }

      document.getElementById('specimen-tbody').addEventListener('click', function (e) {
        var cap = e.target.closest('.status-capsule');
        if (cap) {
          cap.classList.toggle('status-capsule-done');
          e.stopPropagation();
        }
      });

      function updateSortUI() {
        document.querySelectorAll('th.sortable').forEach(function (th) {
          th.classList.remove('sort-asc', 'sort-desc');
          var iconAsc = th.querySelector('.sort-icon-asc');
          var iconDesc = th.querySelector('.sort-icon-desc');
          if (iconAsc) iconAsc.classList.add('hidden');
          if (iconDesc) iconDesc.classList.add('hidden');
          if (th.dataset.sort === sortKey) {
            th.classList.add(sortAsc ? 'sort-asc' : 'sort-desc');
            if (iconAsc) iconAsc.classList.toggle('hidden', !sortAsc);
            if (iconDesc) iconDesc.classList.toggle('hidden', sortAsc);
          }
        });
      }

      function selectRow(id) {
        currentSpecimenId = id;
        document.querySelectorAll('#specimen-tbody tr').forEach(function (tr) {
          tr.classList.remove('tr-selected');
          if (tr.dataset.specimenId === id) tr.classList.add('tr-selected');
        });
        updateSidebar(id);
      }

      function updateSidebar(id) {
        var spec = getSpecimenById(id);
        document.getElementById('sidebar-specimen-id').textContent = id || '-';
        if (!spec) {
          document.getElementById('sidebar-placeholder').classList.remove('hidden');
          document.getElementById('sidebar-content').classList.add('hidden');
          return;
        }
        document.getElementById('sidebar-placeholder').classList.add('hidden');
        document.getElementById('sidebar-content').classList.remove('hidden');

        var info = [
          ['病歷號', spec.patientId],
          ['姓名', spec.name + ' (' + (spec.gender || '') + ')'],
          ['生日', (spec.birthDate || '') + ' (' + (spec.age != null ? spec.age + '歲' : '') + ')'],
          ['檢體來源', spec.department]
        ];
        document.getElementById('sidebar-info').innerHTML = info.map(function (p) {
          return '<div><span class="text-text-muted-light">' + p[0] + ':</span><span class="text-text-light font-medium ml-1">' + (p[1] || '-') + '</span></div>';
        }).join('');

        var m = spec.metrics || {};
        var prev = spec.prevReport || {};
        var f = spec.flowCyt || {};
        // 流式計數欄用 flowCyt：成熟細胞有值，未成熟/異常血球一律為 '-'
        var rows = [
          ['WBC (10e9/L)', m.wbc, m.wbc, prev.wbc],
          ['PLT (10e9/L)', m.plt, m.plt, prev.plt],
          ['Band (%)', f.band !== undefined ? f.band : '-', m.band, prev.band],
          ['Segmented neutrophil (%)', f.segmentedNeutrophil !== undefined ? f.segmentedNeutrophil : '-', m.segmentedNeutrophil, prev.segmentedNeutrophil],
          ['Eosinophil (%)', f.eosinophil !== undefined ? f.eosinophil : '-', m.eosinophil, prev.eosinophil],
          ['Monocyte (%)', f.monocyte !== undefined ? f.monocyte : '-', m.monocyte, prev.monocyte],
          ['Basophil (%)', f.basophil !== undefined ? f.basophil : '-', m.basophil, prev.basophil],
          ['Lymphocyte (%)', f.lymphocyte !== undefined ? f.lymphocyte : '-', m.lymphocyte, prev.lymphocyte],
          ['Atypical lymphocyte (%)', f.atypicalLymphocyte !== undefined ? f.atypicalLymphocyte : '-', m.atypicalLymphocyte, prev.atypicalLymphocyte],
          ['Blast (%)', f.blast !== undefined ? f.blast : '-', m.blast, prev.blast],
          ['Promyelocyte (%)', f.promyelocyte !== undefined ? f.promyelocyte : '-', m.promyelocyte, prev.promyelocyte],
          ['Myelocyte (%)', f.myelocyte !== undefined ? f.myelocyte : '-', m.myelocyte, prev.myelocyte],
          ['Metamyelocyte (%)', f.metamyelocyte !== undefined ? f.metamyelocyte : '-', m.metamyelocyte, prev.metamyelocyte],
          ['Hypersegmented (%)', f.hypersegmented !== undefined ? f.hypersegmented : '-', m.hypersegmented, prev.hypersegmented],
          ['Promonocyte (%)', f.promonocyte !== undefined ? f.promonocyte : '-', m.promonocyte, prev.promonocyte],
          ['Plasma cell (%)', f.plasmaCell !== undefined ? f.plasmaCell : '-', m.plasmaCell, prev.plasmaCell],
          ['Abnormal lymphocyte (%)', f.abnormalLymphocyte !== undefined ? f.abnormalLymphocyte : '-', m.abnormalLymphocyte, prev.abnormalLymphocyte]
        ];
        function shouldHighlightMetric(label, valueStr) {
          var v = parseFloat(valueStr);
          if (isNaN(v)) v = 0;
          switch (label) {
            case 'WBC (10e9/L)':
              return v >= 30; // WBC Count ≧30,000/μl
            case 'Lymphocyte (%)':
              return v >= 60; // 成人≧60%
            case 'Monocyte (%)':
              return v >= 20;
            case 'Eosinophil (%)':
              return v >= 20;
            case 'Basophil (%)':
              return v >= 5;
            case 'Atypical lymphocyte (%)':
              return v >= 10;
            case 'Blast (%)':
              return valueStr && valueStr !== '-' && parseFloat(valueStr) > 0; // Present
            case 'Promyelocyte (%)':
              return valueStr && valueStr !== '-' && parseFloat(valueStr) > 0; // Present
            case 'Myelocyte (%)':
              return v >= 5;
            case 'Metamyelocyte (%)':
              return v >= 10;
            case 'Promonocyte (%)':
              return valueStr && valueStr !== '-' && parseFloat(valueStr) > 0; // Present
            case 'Plasma cell (%)':
              return valueStr && valueStr !== '-' && parseFloat(valueStr) > 0; // Present
            case 'Abnormal lymphocyte (%)':
              return valueStr && valueStr !== '-' && parseFloat(valueStr) > 0; // Present / Suspect
            default:
              return false;
          }
        }

        document.getElementById('sidebar-metrics').innerHTML = rows.map(function (r) {
          var label = r[0];
          var aiValue = r[2];
          var prevValue = r[3];
          var highlight = shouldHighlightMetric(label, aiValue) || shouldHighlightMetric(label, prevValue);
          var rowClass = highlight ? 'bg-danger-light/30' : '';
          var cellClass = highlight ? 'font-bold text-danger-text-light' : '';
          return '<tr class="' + rowClass + '"><td class="p-2 font-medium text-text-muted-light">' + label + '</td><td class="p-2">' + (r[1] || '-') + '</td><td class="p-2 ' + cellClass + '">' + (aiValue || '-') + '</td><td class="p-2 ' + cellClass + '">' + (prevValue || '-') + '</td></tr>';
        }).join('');
      }

      document.getElementById('btn-filter').addEventListener('click', function () {
        var panel = document.getElementById('filter-panel');
        var open = !panel.classList.contains('hidden');
        panel.classList.toggle('hidden', open);
        this.setAttribute('aria-expanded', !open);
      });

      document.querySelectorAll('.status-filter').forEach(function (cb) {
        cb.addEventListener('change', renderTable);
      });

      document.querySelectorAll('.mode-tab').forEach(function (tab) {
        tab.addEventListener('click', function () {
          var mode = this.dataset.mode;
          currentMode = mode;
          document.querySelectorAll('.mode-tab').forEach(function (t) {
            t.classList.remove('bg-primary', 'text-white', 'border-primary');
            t.classList.add('border-border-light', 'bg-surface-light', 'text-text-muted-light');
          });
          this.classList.remove('border-border-light', 'text-text-muted-light', 'bg-surface-light');
          this.classList.add('bg-primary', 'text-white', 'border-primary');
          var defaults = MODE_DEFAULT_STATUS[mode === 'digital' ? 'digital' : 'entity'];
          setStatusFilterCheckboxes(defaults);
          renderTable();
          if (filteredList.length) selectRow(filteredList[0].id);
        });
      });

      document.querySelectorAll('th.sortable').forEach(function (th) {
        th.addEventListener('click', function () {
          var key = this.dataset.sort;
          if (sortKey === key) sortAsc = !sortAsc;
          else { sortKey = key; sortAsc = true; }
          updateSortUI();
          renderTable();
          if (filteredList.length && currentSpecimenId) selectRow(currentSpecimenId);
        });
      });

      document.getElementById('btn-search').addEventListener('click', function () { renderTable(); });
      document.getElementById('specimen-search').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('btn-search').click();
      });
      document.getElementById('exact-match').addEventListener('change', renderTable);
      document.getElementById('filter-department').addEventListener('change', renderTable);
      document.getElementById('filter-machine').addEventListener('change', renderTable);

      document.getElementById('font-smaller').addEventListener('click', function () {
        fontLevel = Math.max(0, fontLevel - 1);
        var body = document.getElementById('body-font-scale');
        body.classList.remove('font-size-small', 'font-size-normal', 'font-size-large');
        body.classList.add(['font-size-small', 'font-size-normal', 'font-size-large'][fontLevel]);
      });
      document.getElementById('font-larger').addEventListener('click', function () {
        fontLevel = Math.min(2, fontLevel + 1);
        var body = document.getElementById('body-font-scale');
        body.classList.remove('font-size-small', 'font-size-normal', 'font-size-large');
        body.classList.add(['font-size-small', 'font-size-normal', 'font-size-large'][fontLevel]);
      });

      if (typeof APP_DATABASE !== 'undefined') {
        var depSel = document.getElementById('filter-department');
        if (APP_DATABASE.departments && depSel) APP_DATABASE.departments.forEach(function (d) { var o = document.createElement('option'); o.value = d; o.textContent = d; depSel.appendChild(o); });
        var macSel = document.getElementById('filter-machine');
        if (APP_DATABASE.machines && macSel) APP_DATABASE.machines.forEach(function (m) { var o = document.createElement('option'); o.value = m; o.textContent = m; macSel.appendChild(o); });
      }
      setDefaultDateToday();
      setStatusFilterCheckboxes(['PLT Check', 'AI Alert', 'Follow-up', 'Digital Review', 'Verified', 'Locked']);
      updateSortUI();
      renderTable();
      if (filteredList.length) selectRow(filteredList[0].id);

      if (window.Tutorial) {
        Tutorial.runOnSpecimenPage();
        var btnTutorial = document.getElementById('btn-tutorial');
        if (btnTutorial) btnTutorial.addEventListener('click', function () { Tutorial.startSpecimen(true); });
      }
    })();
  </script>
</body>
</html>
