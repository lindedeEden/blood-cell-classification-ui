<script>
    function toggleGrid(headerEl) {
      var card = headerEl && headerEl.closest ? headerEl.closest('.group') : (headerEl && headerEl.parentElement);
      if (!card) return;
      var content = card.querySelector('.grid-content');
      var icon = card.querySelector('.toggle-icon');
      if (content) {
        if (content.classList.contains('grid-expanded')) {
          content.classList.remove('grid-expanded');
          content.classList.add('grid-collapsed');
          if (icon) icon.classList.remove('icon-rotate-180');
        } else {
          content.classList.remove('grid-collapsed');
          content.classList.add('grid-expanded');
          if (icon) icon.classList.add('icon-rotate-180');
        }
      }
    }
    (function () {
      var contextMenu = document.getElementById('context-menu');
      if (contextMenu) {
        document.addEventListener('click', function (e) {
          if (!contextMenu.contains(e.target)) contextMenu.style.display = 'none';
        });
        document.addEventListener('keydown', function (e) {
          if (e.key === 'Escape') contextMenu.style.display = 'none';
        });
        contextMenu.addEventListener('contextmenu', function (e) { e.preventDefault(); });
      }
      var backEl = document.getElementById('back-to-list');
      if (backEl) backEl.addEventListener('click', function (e) { e.preventDefault(); if (typeof goToSpecimenList === 'function') goToSpecimenList(); });
      if (window.Tutorial) setTimeout(function () { Tutorial.runOnImagePage(); }, 300);
    })();
</script>
